name: Deploy website naar Azure VM

on:
  push:
    branches:
      - main  # Verander dit naar 'master' als jouw hoofdvertakking zo heet

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Code ophalen uit GitHub
      uses: actions/checkout@v4

    - name: Inloggen op Azure VM en container updaten
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Maak een mapje voor het project op de server als dat er nog niet is
          mkdir -p ~/schoolproject
          
          # 2. Ga naar die map
          cd ~/schoolproject
          
          # 3. Omdat de repo PUBLIC is, halen we de code rechtstreeks binnen via Git
          if [ -d ".git" ]; then
            git pull origin main
          else
            cd ..
            rm -rf schoolproject
            git clone https://github.com/matiastorfs/cloudsystemen-project-MatiasTorfs.git schoolproject
            cd schoolproject
          fi

          # 4. Stop de oude Docker-container als die er al was (voorkomt poort-conflicten)
          sudo docker stop website-container || true
          sudo docker rm website-container || true

          # 5. Bouw de gloednieuwe Docker-image op basis van je Dockerfile
          sudo docker build -t schoolproject-live .

          # 6. Start de container op poort 8080 (intern op de server)
          sudo docker run -d --name website-container -p 8080:80 --restart unless-stopped schoolproject-live